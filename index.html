<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Antalya RP - 3D Alpha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #arayuz { position: absolute; top: 10px; left: 10px; color: #00ff00; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #00ff00; pointer-events: none; }
    </style>
</head>
<body>
    <div id="arayuz">
        <b>ANTALYA RP v1.0</b><br>
        WASD: Hareket | Mouse: Etrafa Bak<br>
        (Ekranın ortasına tıkla, fareyi kilitle)
    </div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // --- SAHNE VE AYARLAR ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Gökyüzü mavisi
        scene.fog = new THREE.Fog(0x87ceeb, 0, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- KONTROLLER (SAĞ TIK / MOUSE) ---
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        // --- IŞIK (GÜNEŞ) ---
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(light);

        // --- DOKULAR (TEXTURE) ---
        const loader = new THREE.TextureLoader();
        // Basit bir asfalt dokusu oluşturuyoruz (Link bozulmasın diye canvas ile yapıyoruz)
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const c = canvas.getContext('2d');
        c.fillStyle = '#333'; c.fillRect(0,0,128,128);
        c.strokeStyle = '#555'; c.strokeRect(0,0,128,128);
        const textureYol = new THREE.CanvasTexture(canvas);
        textureYol.wrapS = textureYol.wrapT = THREE.RepeatWrapping;
        textureYol.repeat.set(50, 50);

        // --- ZEMİN / YOL ---
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshPhongMaterial({ map: textureYol });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- BİNALAR ---
        for(let i=0; i<40; i++) {
            const h = 5 + Math.random() * 15;
            const bGeo = new THREE.BoxGeometry(4, h, 4);
            const bMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
            const b = new THREE.Mesh(bGeo, bMat);
            b.position.set(Math.random()*80-40, h/2, Math.random()*80-40);
            if(Math.abs(b.position.x) < 5) b.position.x += 10; // Yolun ortasını boşalt
            scene.add(b);
        }

        // --- İNSANA BENZEYEN KARAKTER ---
        const group = new THREE.Group();
        // Gövde
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.4), new THREE.MeshPhongMaterial({color: 0xff0000}));
        body.position.y = 1.3;
        group.add(body);
        // Kafa
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshPhongMaterial({color: 0xffdbac}));
        head.position.y = 2;
        group.add(head);
        // Kollar
        const armGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
        const armL = new THREE.Mesh(armGeo, new THREE.MeshPhongMaterial({color: 0xff0000}));
        armL.position.set(-0.45, 1.3, 0);
        group.add(armL);
        const armR = armL.clone();
        armR.position.x = 0.45;
        group.add(armR);

        scene.add(group);
        camera.position.set(0, 2, 5);

        // --- HAREKET ---
        let keys = {};
        document.onkeydown = (e) => keys[e.code] = true;
        document.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);
            const speed = 0.15;
            if (controls.isLocked) {
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
