<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GTV LATEST - ANTALYA v10</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 2px solid #00ff00; z-index: 1000; }
        #para { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="para">Nakit: $1,500</div>
        <div style="color:white; font-size:12px;">Antalya RP v10.0 - Realistik Düzen</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 10, 200);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
            scene.add(light);

            // --- YOL VE KALDIRIM ---
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0x228B22 }));
            ground.rotation.x = -Math.PI / 2; scene.add(ground);

            const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            road.rotation.x = -Math.PI / 2; road.position.y = 0.05; scene.add(road);

            const curbMat = new THREE.MeshPhongMaterial({ color: 0x999999 });
            const curbL = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, 1000), curbMat);
            curbL.position.set(-14, 0.25, 0); scene.add(curbL);
            const curbR = curbL.clone(); curbR.position.x = 14; scene.add(curbR);

            // --- BİTİŞİK VE YOLA BAKAN BİNALAR ---
            const buildings = [];
            function createBuilding(x, z, side) {
                const h = 15 + Math.random() * 10;
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(10, h, 12), new THREE.MeshPhongMaterial({ color: 0x777777 }));
                body.position.y = h/2; group.add(body);

                // Yola Bakan Pencereler
                for(let row=1; row<h/4; row++) {
                    const win = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshPhongMaterial({color: 0xffffcc}));
                    // side -1 ise yol sağda, 1 ise yol solda
                    win.position.set(side * 5.01, row*4, 0);
                    win.rotation.y = Math.PI / 2;
                    group.add(win);
                }

                group.position.set(x, 0, z);
                scene.add(group);
                buildings.push(new THREE.Box3().setFromObject(body));
            }

            // Binaları yola sıfır ve bitişik diziyoruz
            for(let i=0; i<50; i++) {
                if(i % 6 === 0) continue; // Ara sokak
                createBuilding(-23, -i*12.1 + 100, 1);  // Sol taraf (Yol sağında kalıyor)
                createBuilding(23, -i*12.1 + 100, -1); // Sağ taraf (Yol solunda kalıyor)
            }

            // --- İNSAN FORMUNDA KARAKTER ---
            const player = new THREE.Group();
            const skinMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
            const clothesMat = new THREE.MeshPhongMaterial({ color: 0x0055ff });

            // Gövde
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), clothesMat);
            body.position.y = 1.4; player.add(body);
            // Kafa
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
            head.position.y = 2.3; player.add(head);
            // Kollar
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), skinMat);
            armL.position.set(-0.55, 1.4, 0); player.add(armL);
            const armR = armL.clone(); armR.position.x = 0.55; player.add(armR);
            // Bacaklar
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), new THREE.MeshPhongMaterial({color: 0x222222}));
            legL.position.set(-0.2, 0.5, 0); player.add(legL);
            const legR = legL.clone(); legR.position.x = 0.2; player.add(legR);

            scene.add(player);

            // --- KONTROLLER ---
            let keys = {}; let yaw = 0;
            document.onkeydown = (e) => keys[e.code] = true;
            document.onkeyup = (e) => keys[e.code] = false;
            document.addEventListener('click', () => renderer.domElement.requestPointerLock());
            document.addEventListener('mousemove', (e) => { if(document.pointerLockElement) yaw -= e.movementX * 0.003; });

            function animate() {
                requestAnimationFrame(animate);
                let speed = 0.3; let oldPos = player.position.clone();
                let moving = false;

                if (keys['KeyW']) { player.position.x += Math.sin(yaw) * speed; player.position.z += Math.cos(yaw) * speed; moving = true; }
                if (keys['KeyS']) { player.position.x -= Math.sin(yaw) * speed; player.position.z -= Math.cos(yaw) * speed; moving = true; }
                
                player.rotation.y = yaw;

                // Animasyon
                if(moving) {
                    let t = Date.now() * 0.01;
                    legL.rotation.x = Math.sin(t) * 0.5;
                    legR.rotation.x = Math.sin(t + Math.PI) * 0.5;
                    armL.rotation.x = Math.sin(t + Math.PI) * 0.4;
                    armR.rotation.x = Math.sin(t) * 0.4;
                }

                // Çarpışma ve Yükseklik
                let pBox = new THREE.Box3().setFromObject(player);
                for(let b of buildings) { if(pBox.intersectsBox(b)) player.position.copy(oldPos); }
                player.position.y = (Math.abs(player.position.x) > 10) ? 0.25 : 0;

                camera.position.set(player.position.x - Math.sin(yaw) * 12, player.position.y + 6, player.position.z - Math.cos(yaw) * 12);
                camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
                renderer.render(scene, camera);
            }
            animate();
        };
    </script>
</body>
</html>
