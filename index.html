<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GTV LATEST - ANTALYA v12</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 2px solid #00ff00; z-index: 1000; }
        #para { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="para">Nakit: $1,500</div>
        <div style="color:white; font-size:12px;">Antalya RP v12.0 - Texture & Animation</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 10, 300);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
            scene.add(hemiLight);
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // --- YOL VE ZEMİN ---
            const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x1a1a1a }));
            road.rotation.x = -Math.PI / 2; road.position.y = 0.05; scene.add(road);

            const curbMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
            const curbL = new THREE.Mesh(new THREE.BoxGeometry(10, 0.6, 2000), curbMat);
            curbL.position.set(-16, 0.3, 0); scene.add(curbL);
            const curbR = curbL.clone(); curbR.position.x = 16; scene.add(curbR);

            // --- BİNALAR (TEXTURE VE CAMLI) ---
            const buildings = [];
            function createBuilding(x, z, side) {
                const h = 18 + Math.random() * 12;
                const group = new THREE.Group();
                
                // Bina Gövdesi (Texture niyetine renk geçişli materyal)
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(12, h, 14), 
                    new THREE.MeshPhongMaterial({ color: 0x555555, shininess: 10 }) 
                );
                body.position.y = h/2;
                group.add(body);

                // CAMLAR (Yansımalı Materyal)
                const glassMat = new THREE.MeshPhongMaterial({ 
                    color: 0x88ccff, 
                    emissive: 0x112233, 
                    shininess: 100, 
                    opacity: 0.8, 
                    transparent: true 
                });
                
                for(let row=1; row<h/4; row++) {
                    for(let col=-1; col<=1; col++) {
                        const glass = new THREE.Mesh(new THREE.PlaneGeometry(2, 2.5), glassMat);
                        // Pencereleri binanın yola bakan yan yüzeyine diziyoruz
                        glass.position.set(side * 6.01, row*4, col*4);
                        glass.rotation.y = (side === -1) ? Math.PI/2 : -Math.PI/2;
                        group.add(glass);
                    }
                }

                group.position.set(x, 0, z);
                scene.add(group);
                buildings.push(new THREE.Box3().setFromObject(body));
            }

            for(let i=0; i<40; i++) {
                if(i % 5 === 0) continue; 
                createBuilding(-27, -i*15, -1); // Sol binalar
                createBuilding(27, -i*15, 1);  // Sağ binalar
            }

            // --- KARAKTER (HAREKETLİ) ---
            const player = new THREE.Group();
            const clothesMat = new THREE.MeshPhongMaterial({ color: 0x0055ff });
            const pBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), clothesMat);
            pBody.position.y = 1.4; player.add(pBody);
            
            const pHead = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshPhongMaterial({color: 0xffdbac}));
            pHead.position.y = 2.3; player.add(pHead);

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), new THREE.MeshPhongMaterial({color: 0x222222}));
            legL.position.set(-0.2, 0.5, 0); player.add(legL);
            const legR = legL.clone(); legR.position.x = 0.2; player.add(legR);

            scene.add(player);

            // --- KONTROLLER ---
            let keys = {}; let yaw = 0;
            document.onkeydown = (e) => keys[e.code] = true;
            document.onkeyup = (e) => keys[e.code] = false;
            document.addEventListener('click', () => renderer.domElement.requestPointerLock());
            document.addEventListener('mousemove', (e) => { if(document.pointerLockElement) yaw -= e.movementX * 0.003; });

            function animate() {
                requestAnimationFrame(animate);
                let speed = 0.3; let oldPos = player.position.clone();
                let isWalking = false;

                if (keys['KeyW']) { player.position.x += Math.sin(yaw) * speed; player.position.z += Math.cos(yaw) * speed; isWalking = true; }
                if (keys['KeyS']) { player.position.x -= Math.sin(yaw) * speed; player.position.z -= Math.cos(yaw) * speed; isWalking = true; }
                if (keys['KeyA']) { player.position.x += Math.sin(yaw + Math.PI/2) * speed; player.position.z += Math.cos(yaw + Math.PI/2) * speed; isWalking = true; }
                if (keys['KeyD']) { player.position.x += Math.sin(yaw - Math.PI/2) * speed; player.position.z += Math.cos(yaw - Math.PI/2) * speed; isWalking = true; }
                
                player.rotation.y = yaw;

                // --- BACAK ANİMASYONU ---
                if(isWalking) {
                    const t = Date.now() * 0.012;
                    legL.rotation.x = Math.sin(t) * 0.6;
                    legR.rotation.x = Math.sin(t + Math.PI) * 0.6;
                } else {
                    legL.rotation.x = legR.rotation.x = 0;
                }

                // Çarpışma ve Kaldırım Yüksekliği
                let pBox = new THREE.Box3().setFromObject(player);
                for(let b of buildings) { if(pBox.intersectsBox(b)) player.position.copy(oldPos); }
                player.position.y = (Math.abs(player.position.x) > 11) ? 0.3 : 0;

                camera.position.set(player.position.x - Math.sin(yaw) * 12, player.position.y + 7, player.position.z - Math.cos(yaw) * 12);
                camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
                renderer.render(scene, camera);
            }
            animate();
        };
    </script>
</body>
</html>
